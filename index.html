<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Zenkai Tracker</title>

<style>
body{
  font-family: Arial;
  background:#0a0a12;
  color:white;
  text-align:center;
}

/* 🔥 TITULO NEON (REDUCIDO) */
.title{
  font-size:60px;
  font-weight:bold;
  color:#E220F5;
  text-shadow:
    0 0 4px #E220F5,
    0 0 8px #932DCC;
}

/* RANGO */
.rank{
  font-size:50px;
  font-weight:bold;
  margin:10px;
  text-shadow:0 0 6px currentColor;
}

/* COLORES */
.hierro{color:#9ca3af;}
.bronce{color:#cd7f32;}
.plata{color:#c0c0c0;}
.oro{color:#ffd700;}
.platino{color:#38bdf8;}
.esmeralda{color:#22c55e;}
.diamante{color:#60a5fa;}
.master{color:#E220F5;}
.grandmaster{color:#932DCC;}
.challenger{color:#ff00ff;}

/* INPUT */
input{
  padding:10px;
  margin:6px;
  border-radius:6px;
  border:1px solid #932DCC;
  font-size:16px;
  background:#0f0f1a;
  color:white;
  box-shadow:0 0 4px #932DCC;
}

.lp-input{
  width:90px;
  text-align:center;
}

/* BOTONES NEON (REDUCIDO) */
button{
  padding:16px;
  margin:6px;
  border:none;
  border-radius:6px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:#932DCC;
  box-shadow:0 0 6px #932DCC, 0 0 10px #E220F5;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px #E220F5, 0 0 16px #932DCC;
}

.win{background:#22c55e;}
.loss{background:#ef4444;}

.reset{
  background:#64748b;
  display:block;
  margin:10px auto;
}

.add{
  background:#E220F5;
}

/* SELECT */
select{
  padding:10px;
  font-size:16px;
  border-radius:6px;
  background:#0f0f1a;
  color:white;
  border:1px solid #932DCC;
  box-shadow:0 0 4px #932DCC;
}

/* STATUS */
#status{
  font-size:60px;
  font-weight:bold;
  margin:20px;
  text-shadow:0 0 8px currentColor;
}

/* CARD */
.card{
  background:#0f0f1a;
  padding:12px;
  margin:10px auto;
  border-radius:10px;
  width:260px;
  border:1px solid #932DCC;
  box-shadow:0 0 6px #932DCC;
}

/* 🔥 SEPARACIÓN CHAMP TRACKER */
.champ-title{
  margin-top: 40px;
}

/* FIRMA */
.signature{
  position: fixed;
  bottom: 10px;
  right: 12px;
  font-size: 12px;
  opacity: 0.15; /* 👈 ajusta aquí */
  color:#E220F5;
}
</style>
</head>

<body>

<div class="title">Zenkai Tracker</div>

<div id="setup">
<select id="rank"></select><br>
<input id="lpStart" class="lp-input" type="number" placeholder="LP actual"><br>
<button onclick="saveSetup()">Empezar</button>
</div>

<div id="app" style="display:none">

<div id="rankDisplay" class="rank"></div>
<h2 id="lpDisplay"></h2>

<div id="status"></div>

<button class="reset" onclick="resetAll()">Reset</button>

<select id="champSelect"></select><br>

<input id="lpChange" class="lp-input" type="number" placeholder="Ingresa LP"><br>

<button class="win" onclick="addGame('W')">WIN</button>
<button class="loss" onclick="addGame('L')">LOSS</button>

<h2 class="champ-title">Champ Tracker</h2>
<button class="add" onclick="addChamp()">Añadir campeón</button>

<div id="champContainer"></div>

</div>

<div class="signature">pico pal que lee</div>

<script>

// ===== SISTEMA =====
const tiers=["Hierro","Bronce","Plata","Oro","Platino","Esmeralda","Diamante"];
const divisions=["IV","III","II","I"];

const rankEl=document.getElementById("rank");
const lpStartEl=document.getElementById("lpStart");
const rankDisplay=document.getElementById("rankDisplay");
const lpDisplay=document.getElementById("lpDisplay");
const statusEl=document.getElementById("status");
const lpChangeEl=document.getElementById("lpChange");
const champContainer=document.getElementById("champContainer");
const champSelect=document.getElementById("champSelect");

rankEl.innerHTML = tiers.flatMap(t =>
  divisions.map(d => `<option>${t} ${d}</option>`)
).join("");

let data=JSON.parse(localStorage.getItem("data"));
if(data) loadApp();

function saveSetup(){
  let index = rankEl.selectedIndex;

  data={
    tierIndex: Math.floor(index / 4),
    divisionIndex: index % 4,
    lp:parseInt(lpStartEl.value)||0,
    lossStreak:0,
    champs:[]
  };

  save();
  loadApp();
}

function loadApp(){
  document.getElementById("setup").style.display="none";
  document.getElementById("app").style.display="block";
  update();
}

function addGame(result){
  let lp=parseInt(lpChangeEl.value);
  let champName=champSelect.value;
  if(isNaN(lp)||!champName) return;

  let champ=data.champs.find(c=>c.name===champName);

  if(result==="W"){
    data.lp+=lp;
    data.lossStreak=0;
    champ.w++;
  }else{
    data.lp-=lp;
    data.lossStreak++;
    champ.l++;
  }

  if(data.lp>=100){
    data.lp-=100;
    if(data.divisionIndex<3){
      data.divisionIndex++;
    }else{
      data.tierIndex++;
      data.divisionIndex=0;
    }
  }

  if(data.lp<0){
    data.lp=0;
  }

  save();
  update();
}

function updateStatus(){
  let l=data.lossStreak;

  if(l>=2){
    statusEl.innerText="DETENTE ❌";
    statusEl.style.color="#ef4444";
  }else if(l===1){
    statusEl.innerText="CUIDADO ⚠️";
    statusEl.style.color="#eab308";
  }else{
    statusEl.innerText="JUGAR ✅";
    statusEl.style.color="#22c55e";
  }
}

function addChamp(){
  let name=prompt("Nombre del campeón");
  if(!name) return;

  data.champs.push({name,w:0,l:0});
  save();
  update();
}

function update(){
  let tier=tiers[data.tierIndex];
  let div=divisions[data.divisionIndex];

  rankDisplay.innerText=tier+" "+div;
  rankDisplay.className="rank "+tier.toLowerCase();

  lpDisplay.innerText="LP: "+data.lp;

  updateStatus();

  champSelect.innerHTML=data.champs.map(c=>`<option>${c.name}</option>`).join("");

  champContainer.innerHTML="";
  data.champs.forEach(c=>{
    let total=c.w+c.l;
    let wr=total?((c.w/total)*100).toFixed(1):0;

    champContainer.innerHTML+=`
      <div class="card">
        <b>${c.name}</b><br>
        Partidas: ${total}<br>
        WR: ${wr}%
      </div>
    `;
  });
}

function save(){localStorage.setItem("data",JSON.stringify(data));}
function resetAll(){localStorage.removeItem("data");location.reload();}

</script>

</body>
</html>
