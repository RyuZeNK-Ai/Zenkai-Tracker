<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EloTracker</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

h1, h2, h3 {
  margin: 10px 0;
}

input, select {
  width: 90%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.win { background:#22c55e; }
.loss { background:#ef4444; }
.reset { background:#64748b; }

.status {
  font-size: 22px;
  font-weight: bold;
}

.green { color:#22c55e; }
.yellow { color:#eab308; }
.red { color:#ef4444; }

.small {
  opacity: 0.7;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<h1>EloTracker</h1>
<p class="small">Controla tu MMR y toma mejores decisiones</p>

<div id="setup" class="card">

<h2>Setup</h2>

<select id="rank"></select>

<input id="lpStart" type="number" placeholder="LP actual">

<input id="lpWin" type="number" placeholder="LP ganado">
<input id="lpLoss" type="number" placeholder="LP perdido">

<input id="baseWins" type="number" placeholder="Wins totales">
<input id="baseLosses" type="number" placeholder="Losses totales">

<h3>Campeones</h3>
<div id="champInputs"></div>

<button onclick="saveSetup()">Empezar</button>

</div>

<div id="app" class="card" style="display:none">

<h2 id="rankDisplay"></h2>
<h3 id="lpDisplay"></h3>

<div class="status" id="status"></div>

<p id="mmr"></p>
<p id="wr"></p>
<p id="baseWR"></p>
<p id="advice"></p>

<button class="reset" onclick="resetAll()">Reset</button>
<button onclick="exportData()">Exportar</button>
<input type="file" onchange="importData(event)">

<hr>

<select id="champSelect"></select>
<input id="lpChange" type="number" placeholder="LP">

<button class="win" onclick="addGame('W')">WIN</button>
<button class="loss" onclick="addGame('L')">LOSS</button>

<div id="champStats"></div>

</div>

</div>

<script>

// ===== RANKS =====
const ranks = [
"Hierro IV","Hierro III","Hierro II","Hierro I",
"Bronce IV","Bronce III","Bronce II","Bronce I",
"Plata IV","Plata III","Plata II","Plata I",
"Oro IV","Oro III","Oro II","Oro I",
"Platino IV","Platino III","Platino II","Platino I",
"Esmeralda IV","Esmeralda III","Esmeralda II","Esmeralda I",
"Diamante IV","Diamante III","Diamante II","Diamante I",
"Maestro","Gran Maestro","Challenger"
];

// llenar select
rank.innerHTML = ranks.map(r => `<option>${r}</option>`).join("");

// ===== DATA =====
let data = JSON.parse(localStorage.getItem("data"));

if(!data) initSetup();
else loadApp();

// ===== SETUP =====
function initSetup(){
  let html="";
  for(let i=0;i<5;i++){
    html+=`<input placeholder="Champ">
           <input type="number" placeholder="Wins">
           <input type="number" placeholder="Losses"><br>`;
  }
  champInputs.innerHTML=html;
}

function saveSetup(){

  let champs={};
  let inputs=document.querySelectorAll("#champInputs input");

  for(let i=0;i<inputs.length;i+=3){
    let name=inputs[i].value;
    let w=parseInt(inputs[i+1].value)||0;
    let l=parseInt(inputs[i+2].value)||0;
    if(name) champs[name]={w,l};
  }

  let win=parseInt(lpWin.value)||0;
  let loss=parseInt(lpLoss.value)||0;

  data={
    rankIndex:rank.selectedIndex,
    lp:parseInt(lpStart.value)||0,
    lpWin:win,
    lpLoss:loss,
    baseWins:parseInt(baseWins.value)||0,
    baseLosses:parseInt(baseLosses.value)||0,
    champs,
    games:[],
    mmrValue:win-loss
  };

  save();
  loadApp();
}

// ===== CORE =====

function isDivisionIV(){
  return ranks[data.rankIndex].includes("IV");
}

function getLossStreak(){
  let s=0;
  for(let i=data.games.length-1;i>=0;i--){
    if(data.games[i].result==="L") s++;
    else break;
  }
  return s;
}

function addGame(result){

  let champ=champSelect.value;
  let lp=parseInt(lpChange.value);
  if(isNaN(lp)) return;

  if(result==="W"){
    data.lp+=lp;
    data.champs[champ].w++;
    data.baseWins++;
  }else{

    data.lp-=lp;

    if(data.lp<0){

      if(isDivisionIV()){
        let d=prompt("¿Bajaste? (si/no)");
        if(d==="si"){
          let newLP=prompt("LP final");
          data.rankIndex=Math.max(0,data.rankIndex-1);
          data.lp=parseInt(newLP)||0;
        }else data.lp=0;
      }else{
        data.rankIndex=Math.max(0,data.rankIndex-1);
        data.lp=75;
      }

    }

    data.champs[champ].l++;
    data.baseLosses++;
  }

  if(data.lp>=100){
    data.rankIndex=Math.min(ranks.length-1,data.rankIndex+1);
    data.lp-=100;
  }

  data.games.push({result,lp,champ});
  save();
  update();
}

// ===== STATS =====

function getBaseWR(){
  let t=data.baseWins+data.baseLosses;
  return t?(data.baseWins/t*100):0;
}

function updateStats(){

  let wins=data.games.filter(g=>g.result==="W");
  let losses=data.games.filter(g=>g.result==="L");

  let avgWin=wins.length?wins.reduce((a,b)=>a+b.lp,0)/wins.length:data.lpWin;
  let avgLoss=losses.length?losses.reduce((a,b)=>a+b.lp,0)/losses.length:data.lpLoss;

  let last20=data.games.slice(-20);
  let recentWR=last20.length?(last20.filter(g=>g.result==="W").length/last20.length)*100:getBaseWR();

  let wr = recentWR*0.7 + getBaseWR()*0.3;

  let newMMR=(avgWin-avgLoss)+((wr-50)*0.2);

  let prev=data.mmrValue||0;
  data.mmrValue=prev*0.7+newMMR*0.3;

  save();

  mmr.innerText="MMR: "+data.mmrValue.toFixed(2);
  document.getElementById("wr").innerText="WR: "+wr.toFixed(1)+"%";

  return {mmr:data.mmrValue,wr};
}

// ===== STATUS =====

function updateStatus({mmr,wr}){

  let streak=getLossStreak();

  let s="JUGAR",c="green",msg="";

  if(streak>=3||mmr<-2){
    s="PARAR";c="red";msg="Detente.";
  }
  else if(streak===2||mmr<0){
    s="CUIDADO";c="yellow";msg="Cuidado.";
  }
  else{
    if(mmr>2) msg="MMR subiendo.";
    else if(wr>55) msg="Vas bien.";
    else msg="Estable.";
  }

  status.innerHTML=`<span class="${c}">${s}</span>`;
  advice.innerText=msg;
}

// ===== UI =====

function update(){

  rankDisplay.innerText=ranks[data.rankIndex];
  lpDisplay.innerText="LP: "+data.lp;

  let stats=updateStats();
  updateStatus(stats);

  baseWR.innerText="WR Global: "+getBaseWR().toFixed(1)+"%";

  let html="";
  for(let c in data.champs){
    let w=data.champs[c].w,l=data.champs[c].l;
    let total=w+l;
    let wr=total?(w/total*100).toFixed(1):0;
    html+=`<p>${c}: ${wr}% (${total})</p>`;
  }
  champStats.innerHTML=html;

  champSelect.innerHTML=Object.keys(data.champs)
    .map(c=>`<option>${c}</option>`).join("");
}

// ===== STORAGE =====

function save(){localStorage.setItem("data",JSON.stringify(data));}

function resetAll(){
  localStorage.removeItem("data");
  location.reload();
}

function exportData(){
  let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="elotracker.json";
  a.click();
}

function importData(e){
  let file=e.target.files[0];
  let reader=new FileReader();
  reader.onload=()=>{
    localStorage.setItem("data",reader.result);
    location.reload();
  };
  reader.readAsText(file);
}

</script>

</body>
</html>
